<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cyberpunk JS Tetris with Mobile Controls</title>
    <style>
        body {
            background: #13131c; 
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 1.5em; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        /* --- STABLE BACKGROUND LAYERS --- */
        .bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            z-index: -1;
            transition: opacity 1s ease-in-out; 
            opacity: 0;
        }

        #bg1 {
            opacity: 1;
        }

        .game-container {
            display: flex;
            align-items: flex-start;
            gap: 30px;
            background: rgba(0, 0, 0, 0.65);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(0, 213, 255, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
        }

        .board-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        canvas {
            border: solid 2px #0dc2ff;
            background-color: rgba(10, 10, 15, 0.85);
            box-shadow: 0 0 15px rgba(13, 194, 255, 0.5);
            border-radius: 8px;
        }

        #nextCanvas {
            border: solid 2px #ff0d72;
            background-color: rgba(15, 10, 15, 0.85);
            box-shadow: 0 0 15px rgba(255, 13, 114, 0.5);
        }

        #score {
            font-weight: bold;
            letter-spacing: 2px;
            color: #0dff72;
            text-shadow: 0 0 10px rgba(13, 255, 114, 0.6);
        }

        .label {
            font-size: 0.8em;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #aaa;
        }

        button {
            padding: 12px 24px;
            font-size: 0.8em;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
            background: linear-gradient(45deg, #0dc2ff, #3877ff);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(56, 119, 255, 0.4);
            transition: all 0.2s ease;
            width: 100%;
        }

        button:hover {
            background: linear-gradient(45deg, #3877ff, #ff0d72);
            box-shadow: 0 0 20px rgba(255, 13, 114, 0.6);
            transform: translateY(-2px);
        }

        button:disabled {
            background: #333;
            color: #777;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px; 
            min-width: 160px;
        }

        .leaderboard-box {
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            padding-top: 15px;
            width: 100%;
            text-align: left;
        }

        .leaderboard-title {
            font-size: 0.65em;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #ffe138;
            text-shadow: 0 0 8px rgba(255, 225, 56, 0.5);
            margin-bottom: 10px;
            text-align: center;
        }

        ol {
            margin: 0;
            padding-left: 25px;
            font-size: 0.6em;
            color: #fff;
            font-family: monospace;
        }

        li {
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 15, 0.85);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-content {
            background: #13131c;
            padding: 30px;
            border-radius: 10px;
            border: 2px solid #ff0d72;
            box-shadow: 0 0 25px rgba(255, 13, 114, 0.5);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        .modal-content h3 {
            margin-top: 0;
            color: #ffe138;
            text-shadow: 0 0 10px rgba(255, 225, 56, 0.4);
            font-size: 1.1em;
            letter-spacing: 2px;
        }

        .modal-content input {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #0dc2ff;
            padding: 10px;
            color: #fff;
            font-family: monospace;
            font-size: 1.2em;
            text-align: center;
            text-transform: uppercase;
            width: 150px;
            margin-top: 15px;
            margin-bottom: 20px;
            border-radius: 4px;
            box-shadow: 0 0 10px rgba(13, 194, 255, 0.2);
        }

        .modal-content input:focus {
            outline: none;
            border-color: #0dff72;
            box-shadow: 0 0 15px rgba(13, 255, 114, 0.5);
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* Default hidden status for desktop layouts */
        .mobile-controls, .mobile-next-preview {
            display: none; 
        }

        .dpad-container {
            display: grid;
            grid-template-columns: repeat(3, 55px);
            grid-template-rows: repeat(3, 55px);
            gap: 5px;
        }

        .dpad-btn {
            width: 55px;
            height: 55px;
            padding: 0;
            font-size: 1.2em;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, rgba(20, 20, 30, 0.9), rgba(56, 119, 255, 0.4));
            border: 1px solid #0dc2ff;
            box-shadow: 0 0 10px rgba(13, 194, 255, 0.2);
            border-radius: 8px;
            touch-action: manipulation;
        }

        #btnUp    { grid-column: 2; grid-row: 1; border-color: #ffe138; background: linear-gradient(135deg, rgba(20,20,30,0.9), rgba(255,225,56,0.3)); }
        #btnLeft  { grid-column: 1; grid-row: 2; }
        #btnRight { grid-column: 3; grid-row: 2; }
        #btnDown  { grid-column: 2; grid-row: 3; }

        .action-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .rotate-btn {
            width: 90px;
            height: 90px;
            border-radius: 50%; 
            font-size: 1.5em;
            background: linear-gradient(135deg, rgba(255, 13, 114, 0.3), rgba(20, 20, 30, 0.9));
            border: 2px solid #ff0d72;
            box-shadow: 0 0 15px rgba(255, 13, 114, 0.4);
            touch-action: manipulation;
        }

        .dpad-btn:active, .rotate-btn:active {
            background: #ff0d72 !important;
            border-color: #fff !important;
            box-shadow: 0 0 20px #ff0d72 !important;
            transform: scale(0.95);
        }

        /* --- STABLE FIXED CORNER CONFIGURATIONS FOR MOBILE DEVICES --- */
        @media (max-width: 950px) {
            body {
                height: 100vh;
                height: -webkit-fill-available;
                padding: 0;
                margin: 0;
                overflow: hidden;
            }

            .game-container {
                width: 100%;
                height: 100%;
                max-width: none;
                border-radius: 0;
                border: none;
                box-sizing: border-box;
                background: transparent; /* Remixed: Stripped container backdrop entirely */
                box-shadow: none;
                backdrop-filter: none;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: flex-start;
                padding: 15px;
                gap: 10px;
            }

            /* Added a micro-shield panel right behind the vertical board framework */
            .board-wrapper {
                background: rgba(10, 10, 15, 0.5);
                padding: 10px;
                border-radius: 12px;
                backdrop-filter: blur(4px);
                border: 1px solid rgba(255, 255, 255, 0.05);
            }

            /* Scales board comfortably to leave plenty of safe touch buffer room below */
            canvas#tetris {
                height: 50vh;
                width: auto;
                max-height: 400px;
            }

            .mobile-controls {
                display: block; 
            }

            /* Portrait setup: Fixed position right above the rotate button container */
            .mobile-next-preview {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 5px;
                position: fixed;
                bottom: 145px;
                right: 37px;
                z-index: 99;
                transform: scale(0.95);
                transform-origin: bottom center;
            }

            .dpad-container {
                position: fixed;
                bottom: 25px;
                left: 20px;
                z-index: 99;
                transform: scale(0.9);
                transform-origin: bottom left;
            }

            .action-container {
                position: fixed;
                bottom: 35px;
                right: 25px;
                z-index: 99;
                transform: scale(0.95);
                transform-origin: bottom right;
            }

            /* Responsive Sidebar layout tweaks */
            .sidebar {
                width: 100%;
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
                min-width: 0;
                gap: 10px;
                margin-top: 5px;
                background: rgba(10, 10, 15, 0.6);
                padding: 8px 15px;
                box-sizing: border-box;
                border-radius: 8px;
            }

            .sidebar > .label, .sidebar > #nextCanvas, .leaderboard-box {
                display: none;
            }

            #startButton {
                width: 45%;
                padding: 10px;
                font-size: 0.7em;
            }

            #score {
                width: 45%;
                font-size: 0.75em;
                text-align: right;
            }
        }

        /* --- LANDSCAPE ORIENTATION DYNAMIC ADAPTATION --- */
        @media (max-width: 950px) and (orientation: landscape) {
            .game-container {
                justify-content: center;
                padding: 5px;
            }

            /* Scale the board perfectly down so it remains strictly centralized and unobstructed */
            canvas#tetris {
                height: 65vh; 
                width: auto;
            }

            /* Shift buttons slightly closer to corner bounds to match natural wide-grip thumb radius */
            .dpad-container {
                bottom: 15px;
                left: 15px;
                transform: scale(0.85);
            }

            .action-container {
                bottom: 15px;
                right: 20px;
                transform: scale(0.85);
            }

            /* LANDSCAPE RE-ANCHOR: Anchors directly under the game board, perfectly centered horizontally */
            .mobile-next-preview {
                position: fixed;
                bottom: 10px;
                right: auto;
                left: 50%;
                transform: translateX(-50%) scale(0.65);
                transform-origin: bottom center;
                z-index: 98;
                gap: 2px;
            }

            .sidebar {
                position: fixed;
                top: 15px;
                left: 0;
                width: 100%;
                padding: 0 20px;
                box-sizing: border-box;
                pointer-events: none; 
                background: transparent;
                border-radius: 0;
            }

            #startButton, #score {
                pointer-events: auto; 
                font-size: 0.6em;
                width: auto;
                min-width: 110px;
            }
            
            #score {
                margin-left: 5px;
                text-align: left;
                text-shadow: 0 0 10px #000, 0 0 5px rgba(13, 255, 114, 0.6); /* Added shadow support since backdrop is gone */
            }
        }
    </style>
</head>
<body>

    <div id="bg1" class="bg-layer" style="background-image: url('bg.jpeg'); opacity: 1;"></div>
    <div id="bg2" class="bg-layer"></div>

    <audio id="bgMusic" src="music.mp3" loop></audio>
    <audio id="rotateSound" src="rotate.wav"></audio>
    <audio id="clearSound" src="clear.wav"></audio>

    <div class="modal-overlay" id="scoreModal">
        <div class="modal-content">
            <h3>NEW RECORD DETECTED</h3>
            <p style="font-size: 0.65em; color: #aaa; margin: 0; text-transform: uppercase; letter-spacing: 1px;">Input initials to secure record</p>
            <input type="text" id="playerNameInput" maxlength="4" placeholder="AAAA" autocomplete="off"><br>
            <button id="saveScoreButton" style="width: auto; min-width: 140px;">Submit Record</button>
        </div>
    </div>

    <div class="game-container">
        <div class="board-wrapper">
            <canvas id="tetris" width="240" height="400"></canvas>
        </div>

        <div class="sidebar">
            <div id="score">SCORE: 0</div>
            <div class="label">Next Piece</div>
            <canvas id="nextCanvas" width="100" height="100"></canvas>
            <button id="startButton">Start Game</button>
            
            <div class="leaderboard-box">
                <div class="leaderboard-title">TOP 5 RECORDS</div>
                <ol id="leaderboardList"></ol>
            </div>
        </div>
    </div>

    <div class="mobile-controls">
        <div class="dpad-container">
            <button id="btnUp" class="dpad-btn">▲</button>
            <button id="btnLeft" class="dpad-btn">◀</button>
            <button id="btnRight" class="dpad-btn">▶</button>
            <button id="btnDown" class="dpad-btn">▼</button>
        </div>

        <div class="mobile-next-preview">
            <div class="label" style="font-size: 0.55em;">Next</div>
            <canvas id="nextCanvasMobile" width="100" height="100" style="width: 65px; height: 65px; border-color: #ff0d72; box-shadow: 0 0 10px rgba(255, 13, 114, 0.4);"></canvas>
        </div>

        <div class="action-container">
            <button id="btnRotate" class="rotate-btn">↻</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('tetris');
        const context = canvas.getContext('2d');
        context.scale(20, 20);

        const nextCanvas = document.getElementById('nextCanvas');
        const nextContext = nextCanvas.getContext('2d');
        nextContext.scale(20, 20);

        const nextCanvasMobile = document.getElementById('nextCanvasMobile');
        const nextContextMobile = nextCanvasMobile.getContext('2d');
        nextContextMobile.scale(20, 20);

        const music = document.getElementById('bgMusic');
        const rotateSound = document.getElementById('rotateSound');
        const clearSound = document.getElementById('clearSound');
        
        music.volume = 0.1;
        rotateSound.volume = 1.0;
        clearSound.volume = 0.2;

        let arena = createMatrix(12, 20);
        const pieces = 'ILJOTSZ';
        const colors = [
            null,
            '#FF0D72', '#0DC2FF', '#0DFF72',
            '#F538FF', '#FF8E0D', '#FFE138', '#3877FF'
        ];

        const player = {
            pos: {x: 0, y: 0},
            matrix: null,
            score: 0,
        };

        let nextPieceMatrix = null;
        let gameRunning = false;
        let temporaryScoreHolder = 0; 

        const backgroundImages = [
            'bg.jpeg', 'bg2.jpeg', 'bg3.jpeg', 'bg4.jpeg', 'bg5.jpeg', 
            'bg6.jpeg', 'bg7.jpeg', 'bg8.jpeg', 'bg9.jpeg', 'bg10.jpeg', 
            'bg11.jpeg', 'bg12.jpeg', 'bg13.jpeg', 'bg14.jpeg'
        ];
        let currentBgIndex = 0;
        let isLayer1Active = true; 

        function arenaSweep() {
            let rowCount = 1;
            let lineClearedThisTurn = false;

            outer: for (let y = arena.length - 1; y > 0; --y) {
                for (let x = 0; x < arena[y].length; ++x) {
                    if (arena[y][x] === 0) {
                        continue outer;
                    }
                }
                const row = arena.splice(y, 1)[0].fill(0);
                arena.unshift(row);
                ++y;

                player.score += rowCount * 10;
                rowCount *= 2;
                lineClearedThisTurn = true;
            }

            if (lineClearedThisTurn) {
                clearSound.currentTime = 0;
                clearSound.play().catch(e => console.log(e));
            }
        }

        function collide(arena, player) {
            const [m, o] = [player.matrix, player.pos];
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 &&
                       (arena[y + o.y] &&
                        arena[y + o.y][x + o.x]) !== 0) {
                        return true;
                    }
                }
            }
            return false;
        }

        function createMatrix(w, h) {
            const matrix = [];
            while (h--) {
                matrix.push(new Array(w).fill(0));
            }
            return matrix;
        }

        function createPiece(type) {
            if (type === 'T') return [[0, 0, 0], [1, 1, 1], [0, 1, 0]];
            if (type === 'O') return [[2, 2], [2, 2]];
            if (type === 'L') return [[0, 3, 0], [0, 3, 0], [0, 3, 3]];
            if (type === 'J') return [[0, 4, 0], [0, 4, 0], [4, 4, 0]];
            if (type === 'I') return [[0, 5, 0, 0], [0, 5, 0, 0], [0, 5, 0, 0], [0, 5, 0, 0]];
            if (type === 'S') return [[0, 6, 6], [6, 6, 0], [0, 0, 0]];
            if (type === 'Z') return [[7, 7, 0], [0, 7, 7], [0, 0, 0]];
        }

        function draw() {
            context.fillStyle = 'rgba(10, 10, 15, 0.85)';
            context.fillRect(0, 0, canvas.width, canvas.height);
            
            drawMatrix(context, arena, {x: 0, y: 0});
            
            if (player.matrix) {
                drawMatrix(context, player.matrix, player.pos);
            }

            nextContext.fillStyle = 'rgba(15, 10, 15, 0.85)';
            nextContext.fillRect(0, 0, nextCanvas.width, nextCanvas.height);
            
            nextContextMobile.fillStyle = 'rgba(15, 10, 15, 0.85)';
            nextContextMobile.fillRect(0, 0, nextCanvasMobile.width, nextCanvasMobile.height);
            
            if (nextPieceMatrix) {
                const offsetX = (5 - nextPieceMatrix[0].length) / 2;
                const offsetY = (5 - nextPieceMatrix.length) / 2;
                
                drawMatrix(nextContext, nextPieceMatrix, {x: offsetX, y: offsetY});
                drawMatrix(nextContextMobile, nextPieceMatrix, {x: offsetX, y: offsetY});
            }
        }

        function drawMatrix(ctx, matrix, offset) {
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        ctx.fillStyle = colors[value];
                        ctx.fillRect(x + offset.x, y + offset.y, 0.95, 0.95);
                    }
                });
            });
        }

        function merge(arena, player) {
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        arena[y + player.pos.y][x + player.pos.x] = value;
                    }
                });
            });
        }

        function playerDrop() {
            if (!gameRunning) return;
            player.pos.y++;
            if (collide(arena, player)) {
                player.pos.y--;
                merge(arena, player);
                playerReset();
                arenaSweep();
                updateScore();
            }
            dropCounter = 0;
        }

        function playerHardDrop() {
            if (!gameRunning) return;
            while (!collide(arena, player)) {
                player.pos.y++;
            }
            player.pos.y--;
            merge(arena, player);
            playerReset();
            arenaSweep();
            updateScore();
            dropCounter = 0;
        }

        function playerMove(dir) {
            if (!gameRunning) return;
            player.pos.x += dir;
            if (collide(arena, player)) {
                player.pos.x -= dir;
            }
        }

        function getRandomPiece() {
            return createPiece(pieces[pieces.length * Math.random() | 0]);
        }

        function playerReset() {
            if (!nextPieceMatrix) {
                nextPieceMatrix = getRandomPiece();
            }

            player.matrix = nextPieceMatrix;
            nextPieceMatrix = getRandomPiece();
            player.pos.y = 0;
            player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
            
            if (collide(arena, player)) {
                gameRunning = false;
                if (music) music.pause();
                
                handleHighScore(player.score);
                
                document.getElementById('startButton').disabled = false;
                document.getElementById('startButton').innerText = "Play Again";
            }
        }

        function playerRotate(dir) {
            if (!gameRunning) return;
            const pos = player.pos.x;
            let offset = 1;
            rotate(player.matrix, dir);
            
            while (collide(arena, player)) {
                player.pos.x += offset;
                offset = -(offset + (offset > 0 ? 1 : -1));
                if (offset > player.matrix[0].length) {
                    rotate(player.matrix, -dir);
                    player.pos.x = pos;
                    return; 
                }
            }

            rotateSound.currentTime = 0;
            rotateSound.play().catch(e => console.log(e));
        }

        function rotate(matrix, dir) {
            for (let y = 0; y < matrix.length; ++y) {
                for (let x = 0; x < y; ++x) {
                    [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
                }
            }
            if (dir > 0) {
                matrix.forEach(row => row.reverse());
            } else {
                matrix.reverse();
            }
        }

        let dropCounter = 0;
        let dropInterval = 1000;
        let lastTime = 0;

        function update(time = 0) {
            const deltaTime = time - lastTime;
            lastTime = time;

            if (gameRunning) {
                dropCounter += deltaTime;
                if (dropCounter > dropInterval) {
                    playerDrop();
                }
            }

            draw();
            requestAnimationFrame(update);
        }

        function updateScore() {
            document.getElementById('score').innerText = "SCORE: " + player.score;
            checkBackgroundChange();
        }

        function checkBackgroundChange() {
            let targetBgIndex = Math.min(Math.floor(player.score / 10), backgroundImages.length - 1);

            if (targetBgIndex !== currentBgIndex) {
                currentBgIndex = targetBgIndex;
                
                const bg1 = document.getElementById('bg1');
                const bg2 = document.getElementById('bg2');
                const nextImage = backgroundImages[currentBgIndex];

                if (isLayer1Active) {
                    bg2.style.backgroundImage = `url('${nextImage}')`;
                    bg2.style.opacity = 1;
                    bg1.style.opacity = 0;
                    isLayer1Active = false;
                } else {
                    bg1.style.backgroundImage = `url('${nextImage}')`;
                    bg1.style.opacity = 1;
                    bg2.style.opacity = 0;
                    isLayer1Active = true;
                }
            }
        }

        function displayHighScores() {
            const highScores = JSON.parse(localStorage.getItem('cyberpunkTetrisScores')) || [];
            const listContainer = document.getElementById('leaderboardList');
            if(!listContainer) return;
            listContainer.innerHTML = '';

            for (let i = 0; i < 5; i++) {
                const li = document.createElement('li');
                if (highScores[i]) {
                    li.textContent = `${highScores[i].name.padEnd(4, ' ')} - ${highScores[i].score}`;
                } else {
                    li.textContent = `---- - 0000`;
                    li.style.color = '#444'; 
                }
                listContainer.appendChild(li);
            }
        }

        function handleHighScore(finalScore) {
            const highScores = JSON.parse(localStorage.getItem('cyberpunkTetrisScores')) || [];
            
            if (highScores.length < 5 || finalScore > highScores[highScores.length - 1].score) {
                setTimeout(() => {
                    temporaryScoreHolder = finalScore;
                    document.getElementById('playerNameInput').value = '';
                    document.getElementById('scoreModal').classList.add('active');
                    
                    setTimeout(() => document.getElementById('playerNameInput').focus(), 50);
                }, 100);
            } else {
                resetGameState();
            }
        }

        function submitCustomScore() {
            const highScores = JSON.parse(localStorage.getItem('cyberpunkTetrisScores')) || [];
            let nameInput = document.getElementById('playerNameInput').value.trim();
            
            let name = nameInput.toUpperCase().slice(0, 4) || "AAA";

            highScores.push({ name: name, score: temporaryScoreHolder });
            highScores.sort((a, b) => b.score - a.score);
            highScores.splice(5); 

            localStorage.setItem('cyberpunkTetrisScores', JSON.stringify(highScores));
            displayHighScores();

            document.getElementById('scoreModal').classList.remove('active');
            
            resetGameState();
        }

        function resetGameState() {
            arena.forEach(row => row.fill(0));
            player.score = 0;
            currentBgIndex = 0; 
            updateScore();
        }

        document.getElementById('saveScoreButton').addEventListener('click', submitCustomScore);
        
        document.getElementById('playerNameInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') submitCustomScore();
        });

        document.getElementById('startButton').addEventListener('click', () => {
            resetGameState();
            
            const bg1 = document.getElementById('bg1');
            const bg2 = document.getElementById('bg2');
            
            bg1.style.backgroundImage = `url('${backgroundImages[0]}')`;
            bg1.style.opacity = 1;
            bg2.style.opacity = 0;
            isLayer1Active = true;

            playerReset();
            gameRunning = true;
            document.getElementById('startButton').disabled = true;
            
            if (music) {
                music.currentTime = 0;
                music.play().catch(err => {
                    console.warn("Audio engine ready or files missing.", err);
                });
            }
        });

        // Desktop Keyboard Controls
        document.addEventListener('keydown', event => {
            if (document.getElementById('scoreModal').classList.contains('active')) return;

            if (event.key === 'ArrowLeft') playerMove(-1);
            else if (event.key === 'ArrowRight') playerMove(1);
            else if (event.key === 'ArrowDown') playerDrop();
            else if (event.key === 'ArrowUp') playerRotate(1);
            else if (event.key === ' ') {
                event.preventDefault();
                playerHardDrop();
            }
            else if (event.key === 'q' || event.key === 'Q') playerRotate(-1);
            else if (event.key === 'w' || event.key === 'W') playerRotate(1);
        });

        // Safe Mobile Touch Input Integration
        function bindControl(elementId, actionCallback) {
            const element = document.getElementById(elementId);
            
            const handleAction = (e) => {
                e.preventDefault();
                if (!gameRunning) return;
                actionCallback();
            };

            element.addEventListener('touchstart', handleAction, { passive: false });
            element.addEventListener('click', handleAction);
        }

        bindControl('btnLeft', () => playerMove(-1));
        bindControl('btnRight', () => playerMove(1));
        bindControl('btnDown', () => playerDrop());
        bindControl('btnUp', () => playerHardDrop());
        bindControl('btnRotate', () => playerRotate(1));

        // Block scrolling gestures from breaking gameplay on mobile
        document.addEventListener('touchmove', function(e) {
            if (e.scale !== 1) { 
                e.preventDefault(); 
            }
        }, { passive: false });

        displayHighScores();
        draw();
        update();
    </script>
</body>
</html>
